<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Chore Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#fff9f0;--card:#fff;--text:#2d2d2d;--muted:#999;--radius:18px;--shadow:0 4px 24px rgba(0,0,0,.08);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:40px;}
header{background:linear-gradient(135deg,#ff6b6b,#ffd93d);padding:26px 20px 20px;text-align:center;position:relative;overflow:hidden;}
header::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;background:rgba(255,255,255,.12);border-radius:50%;}
header h1{font-family:'Fredoka One',cursive;font-size:2.1rem;color:#fff;text-shadow:2px 3px 0 rgba(0,0,0,.12);}
header p{color:rgba(255,255,255,.9);font-weight:700;font-size:.95rem;margin-top:4px;}
.tabs{display:flex;justify-content:center;gap:8px;padding:16px 16px 4px;}
.tab{padding:8px 22px;border-radius:24px;border:2px solid #ddd;background:#fff;font-family:'Nunito',sans-serif;font-weight:800;font-size:.9rem;cursor:pointer;color:var(--muted);transition:all .2s;}
.tab.active{background:#ff6b6b;border-color:#ff6b6b;color:#fff;box-shadow:0 3px 10px rgba(255,107,107,.3);}
.date-nav{display:flex;align-items:center;justify-content:center;gap:14px;padding:18px 16px 6px;}
.date-nav button{background:#fff;border:2px solid #eee;border-radius:50%;width:40px;height:40px;font-size:1.1rem;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;}
.date-nav button:hover{background:#ffd93d;border-color:#ffd93d;}
#date-display{font-family:'Fredoka One',cursive;font-size:1.25rem;min-width:230px;text-align:center;}
.today-btn{display:block;margin:6px auto 16px;background:#4d96ff;color:#fff;border:none;border-radius:24px;padding:7px 22px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.9rem;cursor:pointer;box-shadow:0 3px 10px rgba(77,150,255,.3);transition:transform .15s,box-shadow .15s;}
.today-btn:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(77,150,255,.4);}
.week-label{text-align:center;font-family:'Fredoka One',cursive;font-size:.95rem;color:var(--muted);margin-bottom:14px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px;padding:0 14px;max-width:960px;margin:0 auto;}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;animation:popIn .35s ease both;}
@keyframes popIn{from{opacity:0;transform:scale(.93) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.card:nth-child(1){animation-delay:.05s}
.card:nth-child(2){animation-delay:.10s}
.card:nth-child(3){animation-delay:.15s}
.card:nth-child(4){animation-delay:.20s}
.card:nth-child(5){animation-delay:.25s}
.ch{padding:13px 16px;display:flex;align-items:center;gap:10px;}
.av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.3rem;background:rgba(255,255,255,.28);flex-shrink:0;}
.ch h2{font-family:'Fredoka One',cursive;font-size:1.3rem;color:#fff;text-shadow:1px 2px 0 rgba(0,0,0,.1);}
.ch .role{font-size:.75rem;color:rgba(255,255,255,.85);font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.cl{padding:12px 16px 16px;display:flex;flex-direction:column;gap:9px;}
.ci{display:flex;align-items:center;gap:10px;background:#f8f8f8;border-radius:11px;padding:9px 12px;}
.ico{font-size:1.2rem;flex-shrink:0;}
.nm{font-weight:800;font-size:.92rem;flex:1;}
.badge{font-size:.68rem;font-weight:800;padding:3px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.4px;flex-shrink:0;}
.hard{background:#ffe0e0;color:#d63031}
.medium{background:#fff3cd;color:#e67e22}
.easy{background:#d4edda;color:#27ae60}
.laundry{background:#e0e7ff;color:#4d96ff}
.daily{background:#f3e0ff;color:#9b59b6}
.deep{background:#e8f5e9;color:#2e7d32}
.cs{background:linear-gradient(135deg,#ff6b6b,#ee5a24)}
.ca{background:linear-gradient(135deg,#ffd93d,#f0932b)}
.co{background:linear-gradient(135deg,#6bcb77,#20bf6b)}
.cd{background:linear-gradient(135deg,#4d96ff,#0652DD)}
.cc{background:linear-gradient(135deg,#c77dff,#9b59b6)}
.hidden{display:none;}
.fs{padding:0 14px;max-width:1150px;margin:0 auto;overflow-x:auto;}
.fs table{width:100%;border-collapse:separate;border-spacing:0 5px;font-size:.8rem;}
.fs th{font-family:'Fredoka One',cursive;font-size:.85rem;color:var(--muted);text-align:left;padding:4px 8px;white-space:nowrap;}
.fs td{background:#fff;padding:9px 8px;vertical-align:middle;box-shadow:var(--shadow);}
.fs td:first-child{border-radius:11px 0 0 11px;font-weight:800;}
.fs td:last-child{border-radius:0 11px 11px 0;}
.fs tr.cur td{background:#fff8e1;}
.pill{display:inline-block;padding:2px 7px;border-radius:9px;font-weight:700;font-size:.75rem;white-space:nowrap;}
footer{text-align:center;margin-top:28px;font-size:.78rem;color:var(--muted);font-weight:600;}
</style>
</head>
<body>
<header>
<h1>🏠 Family Chores</h1>
<p>Shane · Austin · Olivia · Danny · Courtnee</p>
</header>
<div class="tabs">
<button class="tab active" onclick="switchTab('today')">📅 Today</button>
<button class="tab" onclick="switchTab('full')">📋 Full Summer</button>
</div>
<div id="vt">
<div class="date-nav">
<button onclick="changeDay(-1)">◀</button>
<div id="date-display"></div>
<button onclick="changeDay(1)">▶</button>
</div>
<button class="today-btn" onclick="goToday()">⬤ Jump to Today</button>
<div class="week-label" id="wlabel"></div>
<div class="grid" id="grid"></div>
</div>
<div id="vf" class="hidden">
<div class="fs">
<table>
<thead>
<tr><th>Wk</th><th>Dates</th><th>🍽 Dishes</th><th>🧹 Sweep</th><th>🛋 Living</th><th>👕 Laundry</th><th>🐶 Dog</th><th>🍳 Dinner</th></tr>
</thead>
<tbody id="ftbody"></tbody>
</table>
</div>
</div>
<footer>Summer 2025 · Everyone contributes every day · Max 2 chores per day</footer>
<script>
const SUMMER_START=new Date(2025,4,26);
const ALL5=['Shane','Austin','Olivia','Danny','Courtnee'];
const KIDS=['Shane','Austin','Olivia'];
const AVATARS={Shane:'🧒',Austin:'👦',Olivia:'👧',Danny:'👨',Courtnee:'👩'};
const COLOR={Shane:'cs',Austin:'ca',Olivia:'co',Danny:'cd',Courtnee:'cc'};
const DNAMES=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DEEP_CLEANS=['Deep Clean Bathrooms','Clean Windows & Mirrors','Vacuum All Bedrooms','Deep Clean Kitchen/Fridge','Sweep Porch & Garage','Yard & Outdoor Tidying','Baseboards & Laundry Room'];

function getDinner(di){return di%2===0?'Courtnee':'Danny';}
function getDog(di){return ALL5[di%5];}
function getEveningChores(dow,wr){const b=(wr+dow)%3;return{dishes:KIDS[b],sweep:KIDS[(b+1)%3],living:KIDS[(b+2)%3]};}

const KID_LAUNDRY={Shane:[[1,4],[0,4],[2,5]],Austin:[[2,0],[1,5],[0,3]],Olivia:[[3,6],[2,3],[1,4]]};
const ADULT_LAUNDRY={Danny:[[1,5],[3,5],[1,4]],Courtnee:[[0,2],[0,4],[2,6]]};

function localMidnight(d){return new Date(d.getFullYear(),d.getMonth(),d.getDate(),0,0,0,0);}
function getMondayOf(d){const x=localMidnight(d);const day=x.getDay();x.setDate(x.getDate()+(day===0?-6:1-day));return x;}
function getWeekIndex(d){const m=getMondayOf(d),s=getMondayOf(SUMMER_START);return Math.max(0,Math.round((m-s)/(7*864e5)));}
function getDayIndex(d){return Math.round((localMidnight(d)-localMidnight(SUMMER_START))/864e5);}
function dow(d){const w=d.getDay();return w===0?6:w-1;}

function getDailyChores(date){
const wi=getWeekIndex(date),wr=wi%3,di=getDayIndex(date),dw=dow(date);
const ec=getEveningChores(dw,wr);
const dog=getDog(di),din=getDinner(di);
const ch={Shane:[],Austin:[],Olivia:[],Danny:[],Courtnee:[]};
ch[ec.dishes].push({ico:'🍽️',nm:'Wash Dishes',badge:'hard',bl:'Hard'});
ch[ec.sweep].push({ico:'🧹',nm:'Sweep & Mop',badge:'medium',bl:'Medium'});
ch[ec.living].push({ico:'🛋️',nm:'Living Rm & Counters',badge:'easy',bl:'Easy'});
ch[dog].push({ico:'🐶',nm:'Feed the Dog',badge:'daily',bl:'Daily'});
ch[din].push({ico:'🍳',nm:'Cook Dinner',badge:'daily',bl:'Daily'});
KIDS.forEach(k=>{
const[cd,td]=KID_LAUNDRY[k][wr];
if(cd===dw) ch[k].push({ico:'👕',nm:'Wash Clothes',badge:'laundry',bl:'Laundry'});
if(td===dw) ch[k].push({ico:'🏠',nm:'Wash Towels/Linens',badge:'laundry',bl:'Laundry'});
});
['Danny','Courtnee'].forEach(a=>{
const[cd,td]=ADULT_LAUNDRY[a][wr];
if(cd===dw) ch[a].push({ico:'👕',nm:'Wash Clothes',badge:'laundry',bl:'Laundry'});
if(td===dw) ch[a].push({ico:'🏠',nm:'Wash Towels/Linens',badge:'laundry',bl:'Laundry'});
});
['Danny','Courtnee'].forEach(a=>{
if(ch[a].length===0){ch[a].push({ico:'🧽',nm:DEEP_CLEANS[dw],badge:'deep',bl:'Deep Clean'});}
});
return ch;
}

let cur=new Date();cur.setHours(0,0,0,0);

function fmtDate(d){return DNAMES[d.getDay()]+', '+MONTHS[d.getMonth()]+' '+d.getDate()+', '+d.getFullYear();}

function renderToday(){
document.getElementById('date-display').textContent=fmtDate(cur);
const wi=getWeekIndex(cur),wr=wi%3;
document.getElementById('wlabel').textContent='Summer Week '+(wi+1)+'  ·  Rotation '+(wr+1)+' of 3';
const ch=getDailyChores(cur);
const grid=document.getElementById('grid');grid.innerHTML='';
ALL5.forEach((p,i)=>{
const list=ch[p];
const card=document.createElement('div');
card.className='card';
card.style.animationDelay=(i*.07)+'s';
const body=list.map(c=>`<div class="ci"><span class="ico">${c.ico}</span><span class="nm">${c.nm}</span><span class="badge ${c.badge}">${c.bl}</span></div>`).join('');
card.innerHTML=`<div class="ch ${COLOR[p]}"><div class="av">${AVATARS[p]}</div><div><h2>${p}</h2><div class="role">${['Danny','Courtnee'].includes(p)?'Parent':'Kid'}</div></div></div><div class="cl">${body}</div>`;
grid.appendChild(card);
});
}

function changeDay(d){cur.setDate(cur.getDate()+d);renderToday();}
function goToday(){cur=new Date();cur.setHours(0,0,0,0);renderToday();}

function renderFull(){
const tbody=document.getElementById('ftbody');tbody.innerHTML='';
const today=new Date();today.setHours(0,0,0,0);
let d=getMondayOf(SUMMER_START);
let wn=0;
const end=new Date(2025,7,17);
const DN=['M','Tu','W','Th','F','Sa','Su'];
while(d<=end){
wn++;
const wr=(wn-1)%3;
const sun=new Date(d);sun.setDate(sun.getDate()+6);
const isCur=today>=d&&today<=sun;
const di0=getDayIndex(new Date(d));
const ec0=getEveningChores(0,wr);
const lsum=ALL5.map(p=>{
const[cd,td]=KIDS.includes(p)?KID_LAUNDRY[p][wr]:ADULT_LAUNDRY[p][wr];
const n=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
return '<b>'+p.slice(0,3)+'</b>:'+n[cd]+'+'+n[td];
}).join(' ');
const fmt=dt=>MONTHS[dt.getMonth()].slice(0,3)+' '+dt.getDate();
const dogList=Array.from({length:7},(_,i)=>getDog(di0+i));
const dinList=Array.from({length:7},(_,i)=>getDinner(di0+i));
const tr=document.createElement('tr');
if(isCur)tr.className='cur';
tr.innerHTML=`<td><span class="pill" style="background:#f0f0f0">Wk${wn}</span>${isCur?' 👈':''}</td><td style="color:#999;font-size:.73rem;white-space:nowrap">${fmt(d)}–${fmt(sun)}</td><td><span class="pill hard">${ec0.dishes}</span></td><td><span class="pill medium">${ec0.sweep}</span></td><td><span class="pill easy">${ec0.living}</span></td><td style="font-size:.72rem">${lsum}</td><td style="font-size:.72rem">${dogList.map((g,i)=>'<b>'+DN[i]+'</b>:'+g.slice(0,3)).join(' ')}</td><td style="font-size:.72rem">${dinList.map((g,i)=>'<b>'+DN[i]+'</b>:'+g.slice(0,3)).join(' ')}</td>`;
tbody.appendChild(tr);
d.setDate(d.getDate()+7);
}
}

function switchTab(t){
document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
document.getElementById('vt').classList.add('hidden');
document.getElementById('vf').classList.add('hidden');
if(t==='today'){
document.getElementById('vt').classList.remove('hidden');
document.querySelectorAll('.tab')[0].classList.add('active');
} else {
document.getElementById('vf').classList.remove('hidden');
document.querySelectorAll('.tab')[1].classList.add('active');
renderFull();
}
}

renderToday();
</script>
</body>
</html>
